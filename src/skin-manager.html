<!DOCTYPE html>

<style>
    :root {
        --clr-primary: #f8f8f2;
        --clr-title: #ff79c6;
        --clr-subtitle: #f1fa8c;
        --clr-bg: #282a36;
        --clr-menu-link: #8be9fd;
        --clr-slate: #f8f8f2;
        --clr-green: #50fa7b;
        --clr-error: #ff5555;
    }

    body {
        background-color: var(--clr-bg);
        color: var(--clr-primary);
        font-family: "Hack Nerd Font";
    }

    a {
        color: var(--clr-menu-link)
    }

    .navbar .nav-link {
        margin: 20px;
        text-decoration: none;
    }

    .active {
        color: var(--clr-slate);
        text-decoration: solid;
    }

    md-block {
        color: var(--clr-slate);
    }

    h1 {
        color: var(--clr-title);
    }

    h2 {
        color: var(--clr-subtitle);
    }

    h3 {
        color: var(--clr-green);
    }

    noscript {
        color: var(--clr-error)
    }
</style>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCE Qt Launcher - Gestionnaire de Skins</title>
</head>

<body>
    <header></header>
    <main>

        <form id="skinManager" action="" method="POST">
            <label for="skin">Username (Java Username only)</label>
            <input id="skin" name="skin" value="Steve">
            <input type="submit" value="See the skin">
        </form>

        <iframe id="skinViewer"
            src="https://kurojs.github.io/McView3D/embed.html?skin=Steve&width=400&height=400&animation=idle"
            width="400" height="400" frameborder="0">
        </iframe>

        <a id="skin-download" href="https://minotar.net/skin/Steve">Download The skins</a>

    </main>
</body>

<script>
    var skinManager = document.getElementById("skinManager")

    skinManager.onsubmit = function () {
        var skinNameInputBox = document.getElementById("skin")
        var skinDownloadButton = document.getElementById("skin-download")
        var skinName = skinNameInputBox.value

        var skinViewer = document.getElementById("skinViewer")

        var url = "https://kurojs.github.io/McView3D/embed.html?skin=Steve&width=400&height=400&animation=idle"

        var url_skin = "https://minotar.net/skin/Steve"

        url = url.replace("Steve", skinName)
        url_skin = url_skin.replace("Steve", skinName)
        skinViewer.setAttribute("src", url)
        skinDownloadButton.setAttribute("href", url_skin)
        console.log("Skin changed to" + " " + skinName)

        return false
    }
</script>

</html>
