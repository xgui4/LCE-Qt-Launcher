app-id: io.github.xgui4.lce_qt_launcher
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.8'
command: lce-qt-launcher
version: 0.0.21.0a

finish-args:
  - --device=dri
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - python3-requirements.json

  - name: lce_qt_launcher
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=/app/lib/python3.13/site-packages/ --prefix=/app .
      - mkdir -p /app/share/io.github.lce_qt_launcher/data
      - mkdir -p /app/share/io.github.lce_qt_launcher/assets

      - install -Dm644 data/lce_qt_launcher.ini /app/etc/lce_qt_launcher.ini
      - install -Dm644 packages/io.github.xgui4.lce_qt_launcher-isolated.desktop /app/share/applications/io.github.xgui4.lce_qt_launcher-isolated.desktop
      - install -Dm644 packages/lce-content-installer.desktop /app/share/applications/lce-content-installer.desktop
      - install -Dm644 assets/io.github.xgui4.lce_qt_launcher.png /app/share/icons/hicolor/128x128/apps/io.github.xgui4.lce_qt_launcher.png
      - install -Dm644 io.github.xgui4.lce_qt_launcher.metainfo.xml /app/share/metainfo/io.github.xgui4.lce_qt_launcher.metainfo.xml
      - install -Dm644 packages/lce_inst-mime.xml /app/share/mime/packages/io.github.xgui4.lce_qt_launcher.xml
      - install -Dm644 assets/lce_inst.png /app/share/icons/hicolor/128x128/mimetypes/application-x-lce_inst.png
      - install -Dm644 assets/lce_content_installer.png /app/share/icons/hicolor/300x300/apps/lce_content_installer.png
    sources:
      - type: git
        url: "https://github.com/xgui4/lce-qt-launcher"
        branch: fix-workflow
