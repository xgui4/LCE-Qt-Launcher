name: Bug Report
description: File a bug report.
title: "[BUG]: "
labels: ["bug"]

type: bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: app-version
    attributes:
      label: What version of the app you are using ?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
  - type: textarea
    id: operating-system
    attributes:
      label: Operating System
      description: What Operating System you are using ?
      options:
          - Android
          - MacOS
          - GNU/Linux
          - FreeBSD
          - Windows
          - Others (please specify)
      default: 0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Respect
      description: By submitting this issue, you agree to follow our [Code of Respect](code-of-conduct.md).
      options:
        - label: I agree to follow this project's Code of Respect
          required: true
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
