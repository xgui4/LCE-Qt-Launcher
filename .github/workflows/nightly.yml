name: Build and Deploy Nightly

on:
  push:
    branches:
      - nightly

permissions:
  contents: write

jobs:
  nightly:
    name: Build Nightly
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . nuitka zstandard

      - name: Build with Nuitka
        run: |
          hatch run python -m nuitka --standalone --enable-plugin=pyside6 --output-dir=dist src/main.py

      - name: Package Windows build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/main.dist/* -DestinationPath LCE-Qt-Launcher-Windows.zip

      - name: Package Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf LCE-Qt-Launcher-Linux.tar.gz -C dist/main.dist .
      - name: Upload Nightly
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: "Experimental Build (Nightly) generated by GitHub Action.
            WARNING : Only the dark mode is implemented, so the light mode might not work correctly in this release."
          files: |
            *.zip
            *.tar.gz
