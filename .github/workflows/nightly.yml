name: Build and Deploy Nightly

on:
  push:
    branches:
      - nightly

permissions:
  contents: write

jobs:
  nightly:
    name: Build Nightly
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . nuitka zstandard # zstandard accélère Nuitka

      - name: Generate Qt Files (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Generate Qt Files (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          ./build.bat

      - name: Build with Nuitka
        run: |
          python -m nuitka --project src/main.py --output-dir=dist-build

      - name: Package Windows build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist-build/main.dist/* -DestinationPath LCE-Qt-Launcher-Windows.zip

      - name: Package Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf LCE-Qt-Launcher-Linux.tar.gz -C dist-build/main.dist .

      - name: Upload Nightly
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: "Experimental Build (Nightly) generated by GitHub Action."
          files: |
            *.zip
            *.tar.gz
