name: Build and Deploy Nightly

on:
  push:
    branches:
      - nightly

permissions:
  contents: write
 
jobs:
  # --- JOB 1 : NUITKA COMPILATION (Windows/Linux) ---
  build:
    name: Build Nuitka Binaries
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . zstandard
      - name: Build with Nuitka
        run: hatch run python -m nuitka --standalone --assume-yes-for-download --output-dir=dist src/lce_qt_launcher/main.py
      
      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist/main.dist/* -DestinationPath LCE-Qt-Launcher-Windows.zip

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf LCE-Qt-Launcher-Linux.tar.gz -C dist/main.dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz

  # --- JOB 2 : Building Windows Installer ---
  build_windows_installer:
    name: Build Inno Setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile .ISS
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: packages/windows/windows-setup-nigthly.iss
          options: '/O+ /F"LCE_Qt_Launcher_Windows_Nigthly_Setup"'
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: packages/windows/*.exe 

  # --- JOB 3 : Making Arch Linux Packages ---
  build_arch_installer:
    name: Build Arch Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and Build package
        uses: heyhusen/archlinux-package-action@v3.0.0
        with:
          flags: '-p packages/linux/nigthly/PKGBUILD'
          namcap: true
          srcinfo: true
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-arch
          path: ./*.pkg.tar.zst

  # --- JOB 4 : Publish the Nightly Release ---
  release:
    name: Create Nightly Release
    # needs: [build, build_windows_installer, build_arch_installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload Nightly
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: "
            > [!NOTE]\n
            > The nightly prebuild is only avaiable for GNU/Linux and Windows.
            \n
            Experimental Build (Nightly) generated by GitHub Action. The nighy build are experimental nuitka compilation from the nighly branch.
            Package for GNU/Linux and Installer for Windows is coming late. Now includes installers."
          files: |
            ./artifacts/*.exe
            ./artifacts/*.zip
            ./artifacts/*.pkg.tar.zst
            ./artifacts/*.tar.gz