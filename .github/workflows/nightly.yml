name: Build and Deploy Nightly

on:
  push:
    branches:
      - nightly

permissions:
  contents: write
 
jobs:
  nightly:
    name: Build Nightly
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . nuitka zstandard
          
      - name: Build with Nuitka
        run: |
          hatch run python -m nuitka --standalone --assume-yes-for-download --output-dir=dist src/main.py

      - name: Package Windows build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
         Compress-Archive -Path dist/main.dist/* -DestinationPath LCE-Qt-Launcher-Windows.zip

      - name: Package Linux build
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czf LCE-Qt-Launcher-Linux.tar.gz -C dist/main.dist .

      - name: Upload Nightly
        uses: andelf/nightly-release@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly
          name: Nightly Release
          body: "
            > [!NOTE]\n
            > The nightly prebuild is only avaiable for GNU/Linux and Windows.
            \n
            Experimental Build (Nightly) generated by GitHub Action. The nighy build are experimental nuitka compilation from the nighly branch.
            Package for GNU/Linux and Installer for Windows is coming laters."
          files: |
            *.zip
            *.tar.gz