[project]
name = "LCE-Qt-Launcher"
version = "0.0.0"
description = "This is a custom MCLCE Launcher written in python and Qt with Freedom and GNU/Linux support in mind."
requires-python = "==3.12.*"

dependencies = [
    "pyside6",
    "requests",
    "rich",
    "term-image",
    "pillow",
    "pip"
]

[tool.pyside6-project]
files = [
    "src/build_info.py",
    "src/user_pref.py",
    "src/downloader.py",
    "src/instance_manager.py",
    "src/launcher.py",
    "src/system_manager.py",
    "src/user_data.py",
    "src/form.ui",
    "src/system_info.ui",
    "src/json_trans.py",
    "pkg/LCE-Qt-Launcher.desktop",
    "license.md",
    "readme.md",
    "src/main.py",
    "src/cli.py",
    "res.qrc",
    "CODE-DE-CONDUITE.md",
    "code-of-conduct.md",
    "assets/app.ico"
]

