[build-system]
requires = ["hatchling", "hatch-vcs", "PySide6"]
build-backend = "hatchling.build"

[project]
name = "LCE-Qt-Launcher"
dynamic = [ "version" ]
description = "This is a custom Free/Libre Minecraft LCE Launcher written in Python and Qt."
requires-python = "==3.12.*"
license = "GPL-3.0-or-later"
readme = "readme.md"
license-files = [ "license.md" ] 

dependencies = [
    "pyside6",
    "requests",
    "rich",
    "term-image",
    "pillow",
    "pip",
    "hatch",
    "nuitka",
    "patchelf; sys_platform == 'linux'",
]

[project.urls]
Repository = "https://github.com/xgui4/LCE-QT-Launcher"
LicenseURL = "https://www.gnu.org/licenses/gpl-3.0"

[tool.hatch.version]
fallback_version = "0.0.0"
source = "vcs"

[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build]
artifacts = [
    "src/ui_*.py",
    "src/res_rc.py",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/_version.py"

[tool.hatch.version.raw-options]
fallback_version = "0.0.0"
local_scheme = "no-local-version"

[tool.nuitka]
standalone = true
onefile = false
enable-plugin = "pyside6"
windows-icon-from-ico = "assets/app.ico" 
product-name = "LCE-Qt-Launcher"
file-description = "Custom Free/Libre Minecraft LCE Launcher"
copyright = "GPL-3.0-or-later"
windows-file-version = "{from_modules:src._version}"
windows-product-version = "{from_modules:src._version}"
include-data-dir = "assets"
include-distribution-metadata = "LCE-Qt-Launcher"
include-module = [
    "res_rc",
    "ui_form",
    "ui_system_info"
]

packages = ["src"]

[tool.pyside6-project]
files = [
    "src/build_info.py",
    "src/user_pref.py",
    "src/downloader.py",
    "src/instance_manager.py",
    "src/launcher.py",
    "src/system_manager.py",
    "src/theme.py",
    "src/setting_dialog.py",
    "src/form.ui",
    "src/system_info.ui",
    "src/json_trans.py",
    "src/main.py",
    "src/cli.py",
    "src/utils.py",
    "src/term_service.py",
    "src/features.py",
    "src/browser_dialog.py",
    "license.md",
    "readme.md",
    "res.qrc",
    "CODE-DE-CONDUITE.md",
    "code-of-conduct.md",
    "assets/app.ico"
]
