[project]
name = "LCE-Qt-Launcher"
version = "0.0.1"
description = "This is a custom Free/Libre Minecraft LCE Launcher written in Python and Qt."
requires-python = "==3.12.*"
license = {text = "GPLv3"}

[project.urls]
repository = "https://github.com/xgui4/LCE-QT-Launcher"
license = "https://www.gnu.org/licenses/gpl-3.0"

dependencies = [
    "pyside6",
    "requests",
    "rich",
    "term-image",
    "pillow",
    "pip"
]

[tool.pyside6-project]
files = [
    "src/build_info.py",
    "src/user_pref.py",
    "src/downloader.py",
    "src/instance_manager.py",
    "src/launcher.py",
    "src/system_manager.py",
    "src/theme.py",
    "src/setting_dialog.py",
    "src/form.ui",
    "src/system_info.ui",
    "src/json_trans.py",
    "src/main.py",
    "src/cli.py",
    "src/browser_dialog.py",
    "pkg/LCE-Qt-Launcher.desktop",
    "license.md",
    "readme.md",
    "res.qrc",
    "CODE-DE-CONDUITE.md",
    "code-of-conduct.md",
    "assets/app.ico"
]

